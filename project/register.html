<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrieren – Oréon</title>
    <link rel="icon" type="image/png" href="img/logo-def.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/main.js" defer></script>
  </head>
  <body>
    <nav class="navbar scrolled" id="navbar">
      <div class="container">
        <a href="index.html" class="nav-logo">
          <img src="img/logo-def-name.png" class="logo-full" alt="Oréon" />
          <img src="img/logo-def.png" class="logo-icon" alt="Oréon" />
          <span class="logo-text">Oréon</span>
        </a>
        <ul class="nav-links" id="navLinks">
          <li><a href="index.html">Startseite</a></li>
          <li><a href="configurator.html">Konfigurator</a></li>
          <li><a href="account.html">Mein Konto</a></li>
        </ul>
        <div class="nav-icons">
          <a href="cart.html" class="nav-icon nav-cart" title="Warenkorb">
            <i class="fas fa-shopping-bag"></i>
            <span class="nav-cart-count" id="cartCount">0</span>
          </a>
          <a href="login.html" class="nav-icon active" title="Anmelden">
            <i class="fas fa-user"></i>
          </a>
          <button class="nav-toggle" id="navToggle" aria-label="Menü öffnen">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
      </div>
    </nav>

    <div class="toast-container" id="toastContainer"></div>

    <div class="auth-page">
      <div class="auth-card">
        <h1>Registrieren</h1>
        <p class="auth-subtitle">Erstelle dein Oréon-Konto</p>

        <form>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="regFirstName">Vorname</label>
              <input
                type="text"
                class="form-input"
                id="regFirstName"
                placeholder="Max"
                autocomplete="given-name"
              />
            </div>
            <div class="form-group">
              <label class="form-label" for="regLastName">Nachname</label>
              <input
                type="text"
                class="form-input"
                id="regLastName"
                placeholder="Mustermann"
                autocomplete="family-name"
              />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="regEmail">E-Mail</label>
            <input
              type="email"
              class="form-input"
              id="regEmail"
              placeholder="deine@email.at"
              autocomplete="email"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="regPassword">Passwort</label>
            <input
              type="password"
              class="form-input"
              id="regPassword"
              placeholder="Mindestens 8 Zeichen"
              autocomplete="new-password"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="regPasswordConfirm"
              >Passwort bestätigen</label
            >
            <input
              type="password"
              class="form-input"
              id="regPasswordConfirm"
              placeholder="Passwort wiederholen"
              autocomplete="new-password"
            />
          </div>

          <button type="button" class="btn btn-primary" style="width: 100%">
            <i class="fas fa-user-plus"></i> Registrieren
          </button>
        </form>

        <div class="auth-switch">
          Schon ein Konto? <a href="login.html">Zum Login</a>
        </div>
      </div>
    </div>
  </body>
</html>
